name: desktop-build

on:
  pull_request:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-desktop:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    env:
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
      APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
      APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
      APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            setup.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.1 \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            python3-gi \
            python3-gi-cairo

      - name: Install project dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Build React bundle
        run: npm --prefix web run build

      - name: Build native desktop distribution
        run: python -m desktop.build --skip-frontend

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: analiza-movies-${{ runner.os }}-desktop
          path: dist-desktop/*
          if-no-files-found: error
          retention-days: 14
